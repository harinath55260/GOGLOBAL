<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOGLOBAL Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:80px;
}

/* Header */

.profile-header{
background:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.profile-header h2{
font-size:20px;
}

.profile-header i{
font-size:22px;
cursor:pointer;
}

/* Profile Section */

.profile{
background:#fff;
margin:15px;
padding:20px;
border-radius:15px;
text-align:center;
}

.profile-pic{
width:110px;
height:110px;
border-radius:50%;
background:#dcdcdc;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

.name{
margin-top:15px;
font-size:22px;
font-weight:bold;
}

.bio{
margin-top:8px;
color:#666;
}

/* Stats */

.stats{
display:flex;
justify-content:space-around;
margin-top:25px;
}

.stat h3{
font-size:20px;
}

.stat p{
color:#777;
}

/* Button */

.edit-btn{
margin-top:20px;
padding:12px 25px;
border:none;
background:#1877f2;
color:#fff;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

/* Tabs */

.tabs{
background:#fff;
margin:15px;
padding:15px;
display:flex;
justify-content:center;
gap:40px;
border-radius:15px;
}

.tabs span{
font-weight:bold;
cursor:pointer;
}

/* Grid */

.posts-grid{
margin:15px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

.post-box{
height:120px;
background:#dcdcdc;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

/* Bottom Nav */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:15px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.bottom-nav i{
font-size:24px;
}

</style>

</head>

<body>

<header class="profile-header">
<h2>Harinath</h2>
   <a href="settings.html"><i class="fa-solid fa-gear"></i></a>
</header>

<section class="profile">

<div class="profile-pic">
👤
</div>

<div class="name">
Harinath
</div>

<div class="bio">
Software Developer 🚀
</div>

<div class="stats">

<div class="stat">
<h3>120</h3>
<p>Posts</p>
</div>

<div class="stat">
<h3>5K</h3>
<p>Followers</p>
</div>

<div class="stat">
<h3>500</h3>
<p>Following</p>
</div>

</div>

<button class="edit-btn">
Edit Profile
</button>

</section>

<div class="tabs">
<span>📷 Posts</span>
<span>🎥 Reels</span>
</div>

<section class="posts-grid">

<div class="post-box">Post 1</div>
<div class="post-box">Post 2</div>
<div class="post-box">Post 3</div>

<div class="post-box">Post 4</div>
<div class="post-box">Post 5</div>
<div class="post-box">Post 6</div>

<div class="post-box">Post 7</div>
<div class="post-box">Post 8</div>
<div class="post-box">Post 9</div>

</section>

<nav class="bottom-nav">
<a href="home.html"><i class="fa-solid fa-house"></i></a>
<a href="search.html"><i class="fa-solid fa-magnifying-glass"></i></a>
<a href="create-post.html"><i class="fa-solid fa-plus"></i></a>
<a href="reels.html"><i class="fa-solid fa-video"></i></a>
<a href="profile.html"><i class="fa-solid fa-user"></i></a>
</nav>

</body>
</html>
