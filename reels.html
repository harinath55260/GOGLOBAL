
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOGLOBAL Reels</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:60px;
    background:black;
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid #ddd;
    z-index:9999;
}

.bottom-nav a{
    color:white;
    text-decoration:none;
    font-size:22px;
}

.bottom-nav a:hover{
    color:#1877f2;
}


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{ margin:0; background:black; overflow-y:scroll; scroll-snap-type:y mandatory; } .reel{ height:100vh; width:100%; scroll-snap-align:start; position:relative; display:flex; justify-content:center; align-items:center;margin-bottom:30px; } .reel video{ width:100%; height:100vh; object-fit:cover;}


.actions{
    position:absolute;
    right:20px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:18px;
    z-index:10;
}

.actions button{
    background:none;
    border:none;
    color:white;
    font-size:28px;
    cursor:pointer;
}

.rose-btn{
    font-size:32px;
}

.comments-section{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:380px;
    background:white;
    padding:15px;
    border-radius:15px 15px 0 0;
    display:none;
    z-index:100;
}

.comment-input{
    width:75%;
    padding:8px;
}

.comments-section button{
    padding:8px 12px;
}

.comments-list{
    margin-top:10px;
}

.comments-list p{
    margin:5px 0;
    padding:5px;
    background:#f1f1f1;
    border-radius:5px;
}


.active{
    transform:scale(1.2);
}


.reel{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.reel video{
    width:380px;
    height:675px;
}


</style>
</head>

<body>

<!-- Reel 1 -->
<div class="reel">

    <video controls>
        <source src="videos2/demo10.mp4" type="video/mp4">
    </video>

<div class="actions"><button class="rose-btn" onclick="toggleRose(this)"><svg class="roseIcon" viewBox="0 0 128 128" width="36" height="36"><path d="M64 72 L64 118" stroke="#2e7d32" stroke-width="5"/><path d="M64 90 C48 82 38 84 32 96 C46 100 56 98 64 90Z" fill="#43a047"/><path d="M64 84 C80 76 94 78 100 92 C84 94 74 92 64 84Z" fill="#43a047"/><g class="roseFlower"><path d="M64 18 C52 8 34 16 34 32 C34 44 44 52 54 56 C44 60 38 70 40 80 C44 94 56 102 64 102 C72 102 84 94 88 80 C90 70 84 60 74 56 C84 52 94 44 94 32 C94 16 76 8 64 18Z" fill="#ffffff" stroke="#555" stroke-width="3"/><path d="M64 28 C58 22 50 24 48 32 C48 40 56 44 64 46 C72 44 80 40 80 32 C78 24 70 22 64 28Z" fill="#f5f5f5"/><path d="M52 50 C58 44 70 44 76 50 C72 60 56 60 52 50Z" fill="#ededed"/></g></svg><span class="roseCount"></span></button><button class="action-btn" onclick="toggleComments(this)"><i class="fa-regular fa-comment"></i></button><button class="action-btn" onclick="sharePost()"><i class="fa-regular fa-paper-plane"></i></button><button class="action-btn save-btn" onclick="toggleSave(this)"><i class="fa-regular fa-bookmark"></i></button></div><div class="comments-section" style="display:none;"><div class="comment-box"><input type="text" class="comment-input" placeholder="Add a comment..."><button onclick="postComment(this)">Post</button></div><div class="comments-list"></div></div>

    <div class="comments-section">
        <input type="text" class="comment-input" placeholder="Add comment...">
        <button onclick="postComment(this)">Post</button>
        <div class="comments-list">
        </div>
    </div>

</div>

<!-- Reel 2 -->
<div class="reel">

    <video controls>
        <source src="videos/demo1.mp4" type="video/mp4">
    </video>


<div class="actions"><button class="rose-btn" onclick="toggleRose(this)"><svg class="roseIcon" viewBox="0 0 128 128" width="36" height="36"><path d="M64 72 L64 118" stroke="#2e7d32" stroke-width="5"/><path d="M64 90 C48 82 38 84 32 96 C46 100 56 98 64 90Z" fill="#43a047"/><path d="M64 84 C80 76 94 78 100 92 C84 94 74 92 64 84Z" fill="#43a047"/><g class="roseFlower"><path d="M64 18 C52 8 34 16 34 32 C34 44 44 52 54 56 C44 60 38 70 40 80 C44 94 56 102 64 102 C72 102 84 94 88 80 C90 70 84 60 74 56 C84 52 94 44 94 32 C94 16 76 8 64 18Z" fill="#ffffff" stroke="#555" stroke-width="3"/><path d="M64 28 C58 22 50 24 48 32 C48 40 56 44 64 46 C72 44 80 40 80 32 C78 24 70 22 64 28Z" fill="#f5f5f5"/><path d="M52 50 C58 44 70 44 76 50 C72 60 56 60 52 50Z" fill="#ededed"/></g></svg><span class="roseCount"></span></button><button class="action-btn" onclick="toggleComments(this)"><i class="fa-regular fa-comment"></i></button><button class="action-btn" onclick="sharePost()"><i class="fa-regular fa-paper-plane"></i></button><button class="action-btn save-btn" onclick="toggleSave(this)"><i class="fa-regular fa-bookmark"></i></button></div><div class="comments-section" style="display:none;"><div class="comment-box"><input type="text" class="comment-input" placeholder="Add a comment..."><button onclick="postComment(this)">Post</button></div><div class="comments-list"></div></div>

    <div class="comments-section">
        <input type="text" class="comment-input" placeholder="Add comment...">
        <button onclick="postComment(this)">Post</button>
        <div class="comments-list"></div>
    </div>

</div>
